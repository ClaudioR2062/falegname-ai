<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Falegname AI</title>

<style>

body{
  margin:0;
  padding:0;
  background:#111;
  font-family:Arial,sans-serif;
  color:white;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1{
  font-size:48px;
  margin-bottom:10px;
}

#counter{
  color:#bdbdbd;
  margin-bottom:20px;
  font-size:22px;
}

#chat{
  background:#1b1b1b;
  border:1px solid #2a2a2a;
  border-radius:20px;
  padding:20px;
  height:65vh;
  overflow-y:auto;
}

.message{
  display:flex;
  margin-bottom:18px;
}

.user{
  justify-content:flex-end;
}

.ai{
  justify-content:flex-start;
}

.bubble{
  max-width:75%;
  padding:16px;
  border-radius:20px;
  line-height:1.5;
  white-space:pre-wrap;
  font-size:17px;
}

.user .bubble{
  background:#2563eb;
  color:white;
  border-bottom-right-radius:5px;
}

.ai .bubble{
  background:#2b2b2b;
  color:white;
  border-bottom-left-radius:5px;
}

.bottom{
  display:flex;
  gap:10px;
  margin-top:20px;
}

input{
  flex:1;
  padding:18px;
  border-radius:16px;
  border:none;
  background:#1f1f1f;
  color:white;
  font-size:17px;
  outline:none;
}

button{
  padding:18px 26px;
  border:none;
  border-radius:16px;
  background:white;
  color:black;
  font-size:17px;
  font-weight:bold;
  cursor:pointer;
}

.feedback{
  text-align:center;
  margin-top:25px;
}

.feedback a{
  display:inline-block;
  padding:14px 22px;
  background:#2563eb;
  color:white;
  border-radius:14px;
  text-decoration:none;
  font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Falegname AI</h1>

<div id="counter">
Domande rimaste: <span id="remaining">10</span>
</div>

<div id="chat"></div>

<div class="bottom">

<input
  id="input"
  placeholder="Scrivi il problema..."
/>

<button onclick="send()">
Invia
</button>

</div>

<div class="feedback">

<a href="mailto:claudioriva88@icloud.com?subject=Feedback Falegname AI">
Lascia un feedback
</a>

</div>

</div>

<script>

let remaining = localStorage.getItem("remaining");

if(remaining === null){
  remaining = 10;
  localStorage.setItem("remaining", remaining);
}

document.getElementById("remaining").innerText = remaining;

async function send(){

  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const text = input.value.trim();

  if(!text) return;

  if(remaining <= 0){

    alert(
      "Hai terminato le domande gratuite. Scrivi a claudioriva88@icloud.com"
    );

    return;
  }

  chat.innerHTML += `
    <div class="message user">
      <div class="bubble">
        ${text}
      </div>
    </div>
  `;

  input.value = "";

  chat.scrollTop = chat.scrollHeight;

  try{

    const res = await fetch("/api/chat",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        message:text
      })
    });

    const data = await res.json();

    chat.innerHTML += `
      <div class="message ai">
        <div class="bubble">
          ${data.reply}
        </div>
      </div>
    `;

    remaining--;

    localStorage.setItem("remaining", remaining);

    document.getElementById("remaining").innerText = remaining;

    chat.scrollTop = chat.scrollHeight;

  } catch(err){

    chat.innerHTML += `
      <div class="message ai">
        <div class="bubble">
          Errore server
        </div>
      </div>
    `;
  }
}

</script>

</body>
</html>
