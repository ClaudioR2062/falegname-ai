<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Falegname AI</title>

  <style>
    body{
      font-family:Arial;
      max-width:800px;
      margin:40px auto;
      padding:20px;
    }

    #chat{
      border:1px solid #ccc;
      height:500px;
      overflow:auto;
      padding:10px;
      margin-bottom:10px;
    }

    .user{
      margin:10px 0;
      color:#222;
    }

    .ai{
      margin:10px 0;
      white-space:pre-wrap;
      background:#f5f5f5;
      padding:10px;
      border-radius:8px;
    }

    input{
      width:80%;
      padding:10px;
    }

    button{
      padding:10px;
    }
  </style>
</head>

<body>

<h1>Falegname AI</h1>

<div id="chat"></div>

<input id="input" placeholder="Scrivi il problema..." />
<button onclick="send()">Invia</button>

<script>
async function send(){

  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const text = input.value;

  if(!text) return;

  chat.innerHTML += `
    <div class="user">
      <b>Tu:</b> ${text}
    </div>
  `;

  input.value = "";

  const res = await fetch("/api/chat",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      message:text
    })
  });

  const data = await res.json();

  chat.innerHTML += `
    <div class="ai">
      ${data.reply}
    </div>
  `;

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
